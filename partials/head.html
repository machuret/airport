<!-- ============================================================
  PARTIAL: head.html
  All meta tags, fonts, OG, canonical, JSON-LD
  Variables injected by generator:
    {{page_title}}          - Full <title> tag value
    {{meta_description}}    - 150-160 char description
    {{canonical_url}}       - https://airportaccidents.com/...
    {{og_title}}            - Usually same as page_title
    {{og_description}}      - Usually same as meta_description
    {{og_image}}            - Absolute URL to OG image
    {{page_type}}           - homepage | airport | accident | state
    {{schema_json}}         - Injected JSON-LD block (see types below)
  ============================================================ -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<!-- Primary Meta -->
<title>{{page_title}}</title>
<meta name="description" content="{{meta_description}}">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{canonical_url}}">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="AirportAccidents.com">
<meta property="og:url" content="{{canonical_url}}">
<meta property="og:title" content="{{og_title}}">
<meta property="og:description" content="{{og_description}}">
<meta property="og:image" content="{{og_image}}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{og_title}}">
<meta name="twitter:description" content="{{og_description}}">
<meta name="twitter:image" content="{{og_image}}">

<!-- Fonts: preconnect first, then preload critical weight, then full load -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap"></noscript>

<!-- Assets -->
<link rel="stylesheet" href="/assets/css/global.css">

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">
<link rel="alternate icon" href="/assets/img/favicon.ico">
<link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png">

<!-- JSON-LD Schema -->
<script type="application/ld+json">
{{schema_json}}
</script>
