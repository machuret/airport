<!-- ============================================================
  PARTIAL: lead-form.html
  Reusable lead capture form. Inject context vars to pre-populate.
  Variables required:
    {{form_title}}       — e.g. "Free LAX Accident Review"
    {{form_subtitle}}    — e.g. "Tell us what happened at LAX..."
    {{form_airport}}     — pre-selected airport slug (optional)
    {{form_accident}}    — pre-selected accident slug (optional)
    {{submit_label}}     — e.g. "Review My LAX Case →"
  ============================================================ -->
<div class="form-card" id="get-help">
  <h2 class="form-card__title">{{form_title}}</h2>
  <p class="form-card__sub">{{form_subtitle}}</p>

  <form data-lead-form novalidate>

    <div class="form-group">
      <label class="form-group__label" for="form-airport">Which airport?</label>
      <div class="form-group__select-wrap">
        <select id="form-airport" name="airport" class="form-group__select"
          data-airport-select aria-required="true">
          <option value="">Select airport...</option>
          <optgroup label="Major Hubs">
            <option value="hartsfield-jackson-atlanta-international" {{#if_eq form_airport "hartsfield-jackson-atlanta-international"}}selected{{/if_eq}}>Atlanta (ATL) — Hartsfield-Jackson</option>
            <option value="ohare-international" {{#if_eq form_airport "ohare-international"}}selected{{/if_eq}}>Chicago (ORD) — O'Hare</option>
            <option value="los-angeles-international" {{#if_eq form_airport "los-angeles-international"}}selected{{/if_eq}}>Los Angeles (LAX)</option>
            <option value="dallas-fort-worth-international" {{#if_eq form_airport "dallas-fort-worth-international"}}selected{{/if_eq}}>Dallas (DFW)</option>
            <option value="denver-international" {{#if_eq form_airport "denver-international"}}selected{{/if_eq}}>Denver (DEN)</option>
            <option value="john-f-kennedy-international" {{#if_eq form_airport "john-f-kennedy-international"}}selected{{/if_eq}}>New York (JFK)</option>
            <option value="san-francisco-international" {{#if_eq form_airport "san-francisco-international"}}selected{{/if_eq}}>San Francisco (SFO)</option>
            <option value="seattle-tacoma-international" {{#if_eq form_airport "seattle-tacoma-international"}}selected{{/if_eq}}>Seattle (SEA)</option>
            <option value="harry-reid-international" {{#if_eq form_airport "harry-reid-international"}}selected{{/if_eq}}>Las Vegas (LAS)</option>
            <option value="orlando-international" {{#if_eq form_airport "orlando-international"}}selected{{/if_eq}}>Orlando (MCO)</option>
            <option value="miami-international" {{#if_eq form_airport "miami-international"}}selected{{/if_eq}}>Miami (MIA)</option>
            <option value="george-bush-intercontinental" {{#if_eq form_airport "george-bush-intercontinental"}}selected{{/if_eq}}>Houston (IAH)</option>
            <option value="phoenix-sky-harbor-international" {{#if_eq form_airport "phoenix-sky-harbor-international"}}selected{{/if_eq}}>Phoenix (PHX)</option>
            <option value="charlotte-douglas-international" {{#if_eq form_airport "charlotte-douglas-international"}}selected{{/if_eq}}>Charlotte (CLT)</option>
            <option value="newark-liberty-international" {{#if_eq form_airport "newark-liberty-international"}}selected{{/if_eq}}>Newark (EWR)</option>
            <option value="logan-international" {{#if_eq form_airport "logan-international"}}selected{{/if_eq}}>Boston (BOS)</option>
          </optgroup>
          <option value="other">My airport isn't listed...</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-group__label" for="form-accident">Type of accident</label>
      <div class="form-group__select-wrap">
        <select id="form-accident" name="accident" class="form-group__select" aria-required="true">
          <option value="">What happened to you?</option>
          <option value="slip-and-fall" {{#if_eq form_accident "slip-and-fall"}}selected{{/if_eq}}>Slip &amp; Fall (wet floor, uneven surface)</option>
          <option value="jet-bridge-boarding" {{#if_eq form_accident "jet-bridge-boarding"}}selected{{/if_eq}}>Jet Bridge / Boarding Ramp Fall</option>
          <option value="baggage-claim" {{#if_eq form_accident "baggage-claim"}}selected{{/if_eq}}>Baggage Claim Injury</option>
          <option value="vehicle-accidents" {{#if_eq form_accident "vehicle-accidents"}}selected{{/if_eq}}>Vehicle or Baggage Cart Hit Me</option>
          <option value="security-checkpoint" {{#if_eq form_accident "security-checkpoint"}}selected{{/if_eq}}>TSA / Security Checkpoint Injury</option>
          <option value="escalator-elevator" {{#if_eq form_accident "escalator-elevator"}}selected{{/if_eq}}>Escalator or Elevator Accident</option>
          <option value="shuttle-bus-ground-transportation" {{#if_eq form_accident "shuttle-bus-ground-transportation"}}selected{{/if_eq}}>Shuttle Bus or Ground Transport Crash</option>
          <option value="food-court-restaurant" {{#if_eq form_accident "food-court-restaurant"}}selected{{/if_eq}}>Food Poisoning / Restaurant Injury</option>
          <option value="assault-security-failure" {{#if_eq form_accident "assault-security-failure"}}selected{{/if_eq}}>Assault / Security Failure</option>
          <option value="disabled-passenger-assistance" {{#if_eq form_accident "disabled-passenger-assistance"}}selected{{/if_eq}}>Wheelchair / Disabled Passenger Injury</option>
          <option value="parking-lot-curbside" {{#if_eq form_accident "parking-lot-curbside"}}selected{{/if_eq}}>Parking Lot or Curbside Accident</option>
          <option value="worker-accidents" {{#if_eq form_accident "worker-accidents"}}selected{{/if_eq}}>Airport Worker Injury (on the job)</option>
          <option value="other">Other type of injury</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-group__label" for="form-timeframe">When did it happen?</label>
      <div class="form-group__select-wrap">
        <select id="form-timeframe" name="timeframe" class="form-group__select">
          <option value="">Approximate timeframe</option>
          <option value="0-7">Within the last week</option>
          <option value="7-30">1 to 4 weeks ago</option>
          <option value="30-90">1 to 3 months ago</option>
          <option value="90-365">3 to 12 months ago</option>
          <option value="365+">More than a year ago</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-group__label" for="form-description">Brief description</label>
      <textarea id="form-description" name="description" class="form-group__textarea"
        placeholder="Briefly describe what happened..." rows="3"></textarea>
    </div>

    <div class="form-group">
      <label class="form-group__label" for="form-phone">Your phone number</label>
      <input id="form-phone" name="phone" type="tel" class="form-group__input"
        placeholder="(555) 000-0000" autocomplete="tel" aria-required="true">
    </div>

    <!-- Hidden context fields for CRM routing -->
    <input type="hidden" name="source_airport" value="{{form_airport}}">
    <input type="hidden" name="source_accident" value="{{form_accident}}">
    <input type="hidden" name="source_page" value="{{canonical_url}}">

    <button type="submit" class="form__submit">{{submit_label}}</button>
    <p class="form__disclaimer">Free. Confidential. No fees unless we win.</p>

  </form>
</div>
